<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h2>Welcome</h2>
      <p>Enter your details to create an account</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="input-group">
        <label for="email">Your Name</label>
        <input
          type="text"
          id="name"
          name="name"
          [(ngModel)]="registerData.email"
          placeholder="Vijay Narvekar"
          required
          #name="ngModel"
          [class.is-invalid]="name.invalid && name.touched"
        />
        <div class="error-msg" *ngIf="name.invalid && name.touched">
          <small *ngIf="name.errors?.['required']">Name is required.</small>
        </div>
      </div>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="registerData.email"
          placeholder="name@company.com"
          required
          email
          #email="ngModel"
          [class.is-invalid]="email.invalid && email.touched"
        />
        <div class="error-msg" *ngIf="email.invalid && email.touched">
          <small *ngIf="email.errors?.['required']">Email is required.</small>
          <small *ngIf="email.errors?.['email']"
            >Please enter a valid email address.</small
          >
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="registerData.password"
            placeholder="••••••••"
            required
            #pwd="ngModel"
            minlength="6"
            [class.is-invalid]="pwd.invalid && pwd.touched"
          />
          <button type="button" class="toggle-pwd" (click)="togglePassword()">
            {{ showPassword ? "Hide" : "Show" }}
          </button>
        </div>

        <div class="error-msg" *ngIf="pwd.invalid && pwd.touched">
          <small *ngIf="pwd.errors?.['required']">Password is required.</small>
          <small *ngIf="pwd.errors?.['minlength']">
            Must be at least 6 characters .
          </small>
        </div>
      </div>

      
      <button
        type="submit"
        class="login-submit-btn"
        [disabled]="!registerForm.valid"
      >
        Register
      </button>
    </form>

    <p class="signup-footer">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
