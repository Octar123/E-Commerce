<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Enter your details to access your account</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="loginData.email"
          placeholder="name@company.com"
          required
          email
          #email="ngModel"
          [class.is-invalid]="email.invalid && email.touched"
        />
        <div class="error-msg" *ngIf="email.invalid && email.touched">
          <small *ngIf="email.errors?.['required']">Email is required.</small>
          <small *ngIf="email.errors?.['email']"
            >Please enter a valid email address.</small
          >
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="loginData.password"
            placeholder="••••••••"
            required
            #pwd="ngModel"
            minlength="6"
            [class.is-invalid]="pwd.invalid && pwd.touched"
          />
          <button type="button" class="toggle-pwd" (click)="togglePassword()">
            {{ showPassword ? "Hide" : "Show" }}
          </button>
        </div>

        <div class="error-msg" *ngIf="pwd.invalid && pwd.touched">
          <small *ngIf="pwd.errors?.['required']">Password is required.</small>
          <small *ngIf="pwd.errors?.['minlength']">
            Must be at least 6 characters .
          </small>
        </div>
      </div>

      <div class="form-options">
        <!-- <label class="remember-me">
          <input type="checkbox" name="remember"> Remember me
        </label> -->
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button
        type="submit"
        class="login-submit-btn"
        [disabled]="!loginForm.valid"
      >
        Sign In
      </button>
    </form>

    <p class="signup-footer">
      Don't have an account? <a routerLink="/register">Create an account</a>
    </p>
  </div>
</div>
